name: Frontend CI

on:
  push:
    paths:
      - frontend/**
      - .github/workflows/frontend-ci.yml
  pull_request:
    paths:
      - frontend/**
      - .github/workflows/frontend-ci.yml

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: https://example.onrender.com/api
          VITE_CHAINESCROW_CONTRACT_ADDRESS: 0x0000000000000000000000000000000000000001
        run: npm run build:prod
